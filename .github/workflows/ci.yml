name: Java CI with Maven

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run TDD unit tests
        run: ./mvnw -B -Dtest=ReservationControllerTest test

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          POSTGRES_DB=bookingya
          USERNAME_DB=postgres
          PASSWORD_DB=Sandra2026
          EOF

      - name: Start API with Docker Compose
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8081/api/v3/api-docs > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done

          docker compose logs app
          exit 1

      - name: Run BDD Serenity tests
        run: ./mvnw -B -Dbookingya.api.url=http://localhost:8081/api -Dtest=CucumberTest test serenity:aggregate

      - name: Verify Serenity results
        run: |
          test -f target/site/serenity/summary.txt
          grep -q "Failed:               0" target/site/serenity/summary.txt
          grep -q "Failed with errors:   0" target/site/serenity/summary.txt
          grep -q "Compromised:          0" target/site/serenity/summary.txt

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
